<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #11998e, #38ef7d);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 400px;
        }

        h2 {
            margin-bottom: 15px;
        }

        img {
            width: 250px;
            border-radius: 15px;
            margin: 15px 0;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: black;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            background: #222;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>🧠 Prediction</h2>
        <h3>{{ prediction }}</h3>

        <img src="{{ url_for('static', filename=img) }}">

        <br>
        <a href="/" class="btn">⬅ Try Another</a>
    </div>

</body>
</html>
